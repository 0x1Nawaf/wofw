# wofw sample rules — demonstrates each supported rule form.
# Default policy is ACCEPT (fail-open) unless overridden below.

policy accept

# Block telnet from RFC1918 10/8 to anywhere
drop  tcp  from 10.0.0.0/8      to any          port 23

# Allow SSH to a specific host
accept tcp from any            to 192.168.1.10 port 22

# Block outbound DNS (UDP/53)
drop  udp  from any            to any          port 53

# Allow ICMP (ping)
accept icmp from any           to any

# Block a documentation subnet
drop  any  from 203.0.113.0/24 to any
